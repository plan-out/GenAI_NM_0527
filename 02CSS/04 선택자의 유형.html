<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>04 선택자의 유형</title>

  <link rel="stylesheet" href="./선택자.css">
</head>
<body>
  <h1>셀렉터의 유형(p142-145)</h1>
  <p>셀렉터(선택자)란 대상을 구성하는 요소를 뜻함.</p>
  <hr>
  <div id="a" class="ab">영역태그</div>
  <div id="b" class="ab bc">영역태그</div>
  <div id="c" class="bc">영역태그</div>

  <!--
    id는 해당페이지에서 중복불가이다.
    class는 여러요소가 중복하여 동일한 클래스명을
    가질 수 있으며, 다중으로 클래스 부여도 가능하다.

    [주의사항]
    1.숫자로 시작하거나, 숫자로만 되어 있으면 안됨.
    2.띄어쓰면 안된다.
  -->
</body>
</html>
