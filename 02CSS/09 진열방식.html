<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>09 진열방식</title>
  <style>
    .tag{
      border:3px solid #000;
      width:200px; height:100px;
      margin:20px;
    }
    .block{display:inline;}
    .inline{display:block;}
  </style>
</head>
<body>
  <!--블럭태그-->
  <div class="block tag">영역태그</div>
  <h1 class="block tag">제목태그</h1>
  <p class="block tag">문단태그</p>

  <!--인라인태그-->
  <a class="inline tag">링크태그</a>
  <span class="inline tag">인라인영역태그</span>
  <em class="inline tag">강조태그</em>


</body>
</html>
