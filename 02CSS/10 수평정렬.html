<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10 수평정렬</title>
  <style>
    h1{font-size:40px; color:#f00;
      font-family:"궁서";
      text-align:right;}
    
    div{border:5px solid #f00;}

    p{border:5px solid #000;
      margin:0; width:100px; height:100px;
      font-size:30px; font-weight:bold;
      text-transform:uppercase;
      background:#ccc; }

    #case1{text-align:center;}
    #case1 p{display:inline;}  

    #case2{font-size:0; 
      text-align:center;}
    #case2 p{display:inline-block;}
    
    #case3 p{float:left;}
    
    
    p:first-child{height:150px;
      background:#cfc;}
    p:last-child{background:#ccf;}  
 
      
  </style>
</head>
<body>
  <h1>블럭요소의 수평정렬</h1>
  <hr>
  <div id="case1">
    <p>a</p><p>b</p><p>c</p><p>d</p>
  </div>
  <hr>
  <div id="case2">
    <p>a</p>
    <p>b</p>
    <p>c</p>
    <p>d</p>
  </div>
  <hr>
  <div id="case3">
    <p>a</p>
    <p>b</p>
    <p>c</p>
    <p>d</p>
  </div>
  
</body>
</html>
