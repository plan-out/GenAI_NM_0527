<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12 Float를 감싸는 부모.html</title>
  <style>
    div{border:10px solid #000;
      overflow:hidden;}

    p{border:5px solid #f00; 
      background:#ffc;
      width:100px; height:100px;
      margin:0; 
      float:left;}

    p:nth-child(3){clear:both;}
  </style>
</head>
<body>
  <div id="parent">
    <p></p>
    <p></p>
    <p></p>
    <p></p>
  </div>

  <a href="">
    <h1></h1>
  </a>
</body>
</html>
